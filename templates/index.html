<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" crossorigin="anonymous" />
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">Credit Card Approval Prediction</h1>

        <div class="alert alert-info">
            Enter an applicant&rsquo;s financial profile and get an instant recommendation.
        </div>

        {% if result %}
            {% if result.error %}
                <div class="alert alert-danger">{{ result.error }}</div>
            {% else %}
                <div class="alert alert-{{ 'success' if result.decision == 'Approved' else 'warning' }}">
                    <h4 class="alert-heading">{{ result.decision }}</h4>
                    <p>Approval probability: {{ (result.probability * 100) | round(1) }}%</p>
                </div>
            {% endif %}
        {% endif %}

        <form method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" min="18" max="100" class="form-control" id="age" name="age" value="{{ form_values.age }}" required />
                </div>
                <div class="col-md-4">
                    <label for="income" class="form-label">Annual Income</label>
                    <input type="number" step="0.01" class="form-control" id="income" name="income" value="{{ form_values.income }}" required />
                </div>
                <div class="col-md-4">
                    <label for="employment_duration_years" class="form-label">Employment Duration (years)</label>
                    <input type="number" min="0" max="60" class="form-control" id="employment_duration_years" name="employment_duration_years" value="{{ form_values.employment_duration_years }}" required />
                </div>
                <div class="col-md-4">
                    <label for="existing_loan_balance" class="form-label">Existing Loan Balance</label>
                    <input type="number" step="0.01" class="form-control" id="existing_loan_balance" name="existing_loan_balance" value="{{ form_values.existing_loan_balance }}" required />
                </div>
                <div class="col-md-4">
                    <label for="credit_inquiries_last_6m" class="form-label">Credit Inquiries (last 6 months)</label>
                    <input type="number" min="0" max="20" class="form-control" id="credit_inquiries_last_6m" name="credit_inquiries_last_6m" value="{{ form_values.credit_inquiries_last_6m }}" required />
                </div>
                <div class="col-md-4">
                    <label for="num_credit_cards" class="form-label">Number of Credit Cards</label>
                    <input type="number" min="0" max="10" class="form-control" id="num_credit_cards" name="num_credit_cards" value="{{ form_values.num_credit_cards }}" required />
                </div>
                <div class="col-md-4">
                    <label for="employment_type" class="form-label">Employment Type</label>
                    <select class="form-select" id="employment_type" name="employment_type" required>
                        {% for value in employment_types %}
                        <option value="{{ value }}" {% if form_values.employment_type == value %}selected{% endif %}>{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="marital_status" class="form-label">Marital Status</label>
                    <select class="form-select" id="marital_status" name="marital_status" required>
                        {% for value in marital_statuses %}
                        <option value="{{ value }}" {% if form_values.marital_status == value %}selected{% endif %}>{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="property_area" class="form-label">Property Area</label>
                    <select class="form-select" id="property_area" name="property_area" required>
                        {% for value in property_areas %}
                        <option value="{{ value }}" {% if form_values.property_area == value %}selected{% endif %}>{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="payment_status_code" class="form-label">Payment Status Code</label>
                    <select class="form-select" id="payment_status_code" name="payment_status_code" required>
                        {% for value in payment_status_codes %}
                        <option value="{{ value }}" {% if form_values.payment_status_code == value %}selected{% endif %}>{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Predict Approval</button>
            </div>
        </form>
    </div>
</body>
</html>
